server {
    server_name 8k23h5ly.yagao.online;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/yagao.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yagao.online/privkey.pem;

    charset utf-8;
    client_max_body_size 100M;

    access_log /var/log/nginx/sub2api_access.log;
    error_log /var/log/nginx/sub2api_error.log;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    server_name 8k23h5ly.yagao.online;
    return 301 https://$server_name$request_uri;
}
